name: Deploy to Cloud Run

on:
  push:
    branches: [main]
    paths:
      - 'api/**'
      - 'packages/scanner/**'
      - 'Dockerfile.cloudrun'
  workflow_dispatch:

env:
  PROJECT_ID: airlock-scanner
  REGION: us-central1
  SERVICE_NAME: airlock-api

jobs:
  setup:
    runs-on: ubuntu-latest
    outputs:
      short_sha: ${{ steps.vars.outputs.SHORT_SHA }}
    steps:
      - uses: actions/checkout@v4
      - id: vars
        run: |
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-8)
          echo "SHORT_SHA=${SHORT_SHA}" >> $GITHUB_OUTPUT

  deploy:
    needs: setup
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2.1.0
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2.1.0

      - name: Configure Docker auth
        run: gcloud auth configure-docker us-central1-docker.pkg.dev --quiet

      - name: Create Artifact Registry repository
        run: |
          if ! gcloud artifacts repositories describe airlock \
            --location=us-central1 --project=airlock-scanner --quiet 2>/dev/null; then
            gcloud artifacts repositories create airlock \
              --repository-format=docker \
              --location=us-central1 \
              --description="AirLock container images" \
              --project=airlock-scanner
          fi

      - name: Build and push container image
        run: |
          IMAGE="us-central1-docker.pkg.dev/airlock-scanner/airlock/airlock-api"
          docker build \
            --file Dockerfile.cloudrun \
            --tag "${IMAGE}:${{ needs.setup.outputs.short_sha }}-${{ github.run_number }}" \
            --tag "${IMAGE}:latest" \
            .
          docker push "${IMAGE}:latest"
          docker push "${IMAGE}:${{ needs.setup.outputs.short_sha }}-${{ github.run_number }}"

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy airlock-api \
            --image="us-central1-docker.pkg.dev/airlock-scanner/airlock/airlock-api:latest" \
            --region=us-central1 \
            --project=airlock-scanner \
            --service-account=airlock-api-runtime@airlock-scanner.iam.gserviceaccount.com \
            --platform=managed \
            --allow-unauthenticated \
            --port=8080 \
            --memory=1Gi \
            --cpu=2 \
            --min-instances=0 \
            --max-instances=10 \
            --concurrency=80 \
            --timeout=60s \
            --set-env-vars="NODE_ENV=production,APP_URL=https://airlock.codes" \
            --set-secrets="STRIPE_SECRET_KEY=stripe-secret-key:latest,STRIPE_WEBHOOK_SECRET=stripe-webhook-secret:latest,SUPABASE_URL=supabase-url:latest,SUPABASE_SERVICE_KEY=supabase-service-key:latest,STRIPE_PRICE_STARTER=stripe-price-starter:latest,STRIPE_PRICE_PRO=stripe-price-pro:latest,STRIPE_PRICE_SCALE=stripe-price-scale:latest" \
            --quiet

      - name: Report deployment URL
        run: |
          URL=$(gcloud run services describe airlock-api \
            --region=us-central1 \
            --project=airlock-scanner \
            --format="value(status.url)" | sed 's|https://||')
          echo ""
          echo "✅ AirLock API deployed to: https://${URL}"
          echo "   Health: https://${URL}/health"
          echo "   Scan:   POST https://${URL}/api/scan"
          echo ""