name: Deploy to Cloud Run

on:
  push:
    branches: [main]
    paths:
      - 'api/**'
      - 'packages/scanner/**'
      - 'Dockerfile.cloudrun'
  workflow_dispatch:
    inputs:
      service_name:
        description: 'Cloud Run service name'
        required: false
        default: 'airlock-api'

env:
  PROJECT_ID: airlock-scanner
  REGION: us-central1
  SERVICE_NAME: airlock-api
  REPOSITORY: airlock
  IMAGE: $REGION-docker.pkg.dev/$PROJECT_ID/$REPOSITORY/$SERVICE_NAME

jobs:
  setup:
    runs-on: ubuntu-latest
    outputs:
      short_sha: ${{ steps.vars.outputs.SHORT_SHA }}
    steps:
      - uses: actions/checkout@v4
      - id: vars
        run: echo "SHORT_SHA=$(echo ${{ github.sha }} | cut -c1-8)" >> $GITHUB_OUTPUT

  deploy:
    needs: setup
    runs-on: ubuntu-latest
    environment: production

    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker auth
        run: gcloud auth configure-docker $REGION-docker.pkg.dev --quiet

      - name: Create Artifact Registry repository
        run: |
          if ! gcloud artifacts repositories describe $REPOSITORY \
            --location=$REGION --quiet 2>/dev/null; then
            gcloud artifacts repositories create $REPOSITORY \
              --repository-format=docker \
              --location=$REGION \
              --description="AirLock container images"
          fi

      - name: Build and push container image
        run: |
          docker build \
            --file Dockerfile.cloudrun \
            --tag $IMAGE:${{ needs.setup.outputs.short_sha }}-${{ github.run_number }} \
            --tag $IMAGE:latest \
            .
          docker push $IMAGE:latest
          docker push $IMAGE:${{ needs.setup.outputs.short_sha }}-${{ github.run_number }}

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy $SERVICE_NAME \
            --image=$IMAGE:latest \
            --region=$REGION \
            --platform=managed \
            --allow-unauthenticated \
            --port=8080 \
            --memory=1Gi \
            --cpu=2 \
            --min-instances=0 \
            --max-instances=20 \
            --concurrency=80 \
            --timeout=60s \
            --set-env-vars="NODE_ENV=production,APP_URL=https://airlock.codes" \
            --set-secrets="STRIPE_SECRET_KEY=stripe-secret-key:latest,STRIPE_WEBHOOK_SECRET=stripe-webhook-secret:latest,SUPABASE_URL=supabase-url:latest,SUPABASE_SERVICE_KEY=supabase-service-key:latest,STRIPE_PRICE_STARTER=stripe-price-starter:latest,STRIPE_PRICE_PRO=stripe-price-pro:latest,STRIPE_PRICE_SCALE=stripe-price-scale:latest" \
            --quiet

      - name: Report deployment URL
        run: |
          URL=$(gcloud run services describe $SERVICE_NAME \
            --region=$REGION \
            --format="value(status.url)" | sed 's|https://||')
          echo ""
          echo "✅ AirLock API deployed to: https://$URL"
          echo "   Health: https://$URL/health"
          echo "   Scan:   POST https://$URL/api/scan"
          echo ""
