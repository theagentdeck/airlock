name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Build dist
        run: |
          python3 -m pip install build twine
          cd packages/scanner && python3 -m build --wheel

      - name: Copy dist to workspace root
        run: |
          mkdir -p dist
          cp packages/scanner/dist/*.whl dist/

      - name: Publish to PyPI
        env:
          TWINE_PASSWORD: ${{ secrets.PYPI_API_TOKEN }}
          TWINE_USERNAME: __token__
        run: |
          twine upload dist/*