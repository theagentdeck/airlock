name: Release to PyPI

on:
  push:
    tags:
      - "v*"

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install publishing tools
        run: |
          python -m pip install --upgrade pip
          python -m pip install --upgrade "build>=1.2" "twine>=6.1.0" "packaging>=24.2" "setuptools>=77.0.3" wheel
          python -m pip show build twine packaging setuptools wheel

      - name: Clean dist
        run: |
          rm -rf dist
          rm -rf packages/scanner/dist packages/scanner/build packages/scanner/*.egg-info packages/scanner/src/*.egg-info

      - name: Build wheel
        working-directory: packages/scanner
        run: |
          python -m build --wheel
          mkdir -p ../../dist
          cp dist/*.whl ../../dist/

      - name: Inspect wheel metadata
        run: |
          ls -lah dist
          python -m twine check dist/* --strict

      - name: Publish to PyPI
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_API_TOKEN }}
        run: |
          python -m twine upload dist/*