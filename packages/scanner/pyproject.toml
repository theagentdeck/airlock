[build-system]
requires = ["setuptools>=77.0.3", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "airlock-codes"
version = "0.2.2"
description = "AirLock — source-to-sink firewall for agentic web browsing"
readme = "README.md"
license = "MIT"
license-files = ["LICENSE*"]
authors = [{name = "TheAgentDeck", email = "founders@theagentdeck.ai"}]
keywords = ["airlock", "prompt-injection", "agent-security", "ai-safety", "agentic", "scanner"]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Programming Language :: Python :: 3",
    "Topic :: Security",
]
requires-python = ">=3.8"

[project.scripts]
airlock = "airlock.__main__:main"

[tool.setuptools.packages.find]
where = ["src"]